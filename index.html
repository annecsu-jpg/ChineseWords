<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>康軒一下 生字筆畫小達人</title>
  <script src="https://cdn.jsdelivr.net/npm/hanzi-writer@3.5/dist/hanzi-writer.min.js"></script>
  <style>
    /* ========== 全局設定 ========== */
    body {
      font-family: '微軟正黑體', '標楷體', sans-serif;
      background-color: #F0F8FF;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      user-select: none; /* 防止小朋友誤觸選取文字 */
    }

    .container {
      width: 95%;
      max-width: 1000px;
      background: white;
      border-radius: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      padding: 30px;
      text-align: center;
      box-sizing: border-box;
    }

    h1 {
      color: #333;
      font-size: 2.2em;
      margin: 0 0 20px 0;
    }

    /* ========== 第一頁：首頁 (選單) ========== */
    #homePage {
      display: block; /* 預設顯示 */
    }
    .lesson-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    @media (max-width: 800px) { .lesson-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 500px) { .lesson-grid { grid-template-columns: repeat(2, 1fr); } }

    .lesson-btn {
      background-color: #fff;
      border: 5px solid;
      border-radius: 20px;
      padding: 25px 10px;
      font-size: 1.6em;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 6px 0px rgba(0,0,0,0.1);
      transition: all 0.2s ease;
    }
    .lesson-btn:active { transform: translateY(4px); box-shadow: 0 2px 0px rgba(0,0,0,0.1); }
    .color-1 { border-color: #FF7043; color: #D84315; }
    .color-2 { border-color: #FFA726; color: #EF6C00; }
    .color-3 { border-color: #FFEE58; color: #F57F17; }
    .color-4 { border-color: #9CCC65; color: #558B2F; }
    .color-5 { border-color: #26A69A; color: #00695C; }
    .color-6 { border-color: #29B6F6; color: #0277BD; }

    /* ========== 第二頁：生字學習頁 ========== */
    #learningPage {
      display: none; /* 預設隱藏 */
    }

    /* 頂部：生字導覽列 */
    .top-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
      padding: 15px;
      background-color: #f9f9f9;
      border-radius: 15px;
    }
    
    .word-tab {
      position: relative;
      font-family: '標楷體', serif;
      font-size: 2em;
      padding: 10px 20px;
      border: 3px solid #ccc;
      border-radius: 15px;
      background: white;
      cursor: pointer;
      transition: 0.2s;
    }
    /* 正在練習的字 */
    .word-tab.active {
      border-color: #29B6F6;
      background-color: #E1F5FE;
      transform: scale(1.1);
    }
    /* 過關的字：加上綠色圓圈勾勾 */
    .word-tab.completed::after {
      content: '✔';
      position: absolute;
      top: -10px;
      right: -10px;
      width: 25px;
      height: 25px;
      background-color: #4CAF50;
      color: white;
      font-size: 16px;
      line-height: 25px;
      border-radius: 50%;
      border: 2px solid white;
    }

    /* 中央：寫字畫布區 */
    .canvas-container {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 20px 0;
    }
    /* 畫布的底框與十字線 */
    #character-canvas {
      background-color: #fff;
      border: 4px solid #ccc; 
      border-radius: 15px;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
      cursor: crosshair;
      /* 利用漸層畫出簡單的中心十字虛線 */
      background-image: 
        linear-gradient(to right, transparent 49.5%, #e0e0e0 49.5%, #e0e0e0 50.5%, transparent 50.5%),
        linear-gradient(to bottom, transparent 49.5%, #e0e0e0 49.5%, #e0e0e0 50.5%, transparent 50.5%);
    }

    /* 底部：控制按鈕區 */
    .bottom-bar {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }
    .ctrl-btn {
      font-size: 1.2em;
      padding: 10px 20px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      color: white;
      transition: opacity 0.2s;
    }
    .ctrl-btn:hover { opacity: 0.8; }
    .btn-home { background-color: #9E9E9E; }
    .btn-redo { background-color: #FF9800; }
    .btn-next { background-color: #4CAF50; display: none; /* 預設隱藏，全過關才顯示 */ }
  </style>
</head>
<body>

  <div class="container">
    
    <div id="homePage">
      <h1>📚 康軒國語 (一下) 寫字練習 ✍️</h1>
      <main class="lesson-grid" id="lessonGrid"></main>
    </div>

    <div id="learningPage">
      <h1 id="lessonTitle">課文標題</h1>
      
      <div class="top-bar" id="wordListBar"></div>

      <div class="canvas-container">
        <div id="character-canvas"></div>
      </div>

      <div class="bottom-bar">
        <button class="ctrl-btn btn-home" onclick="goHome()">🏠 回首頁</button>
        <button class="ctrl-btn btn-redo" onclick="restartQuiz()">🔄 重寫一次</button>
        <button class="ctrl-btn btn-next" id="nextLessonBtn" onclick="goToNextLesson()">➡️ 下一課</button>
      </div>
    </div>

  </div>

  <script>
    // --- 1. 資料準備 (康軒一下全 12 課完整生字) ---
    const lessonsData = [
      { id: 1, title: "第一課", words: ["要", "靜", "天", "空", "雲", "水", "蟲", "鳥", "草", "先", "完", "再", "去"] },
      { id: 2, title: "第二課", words: ["園", "聽", "沒", "正", "唱", "著", "輕", "快", "歌", "出", "新", "芽", "聞", "身", "香", "呢"] },
      { id: 3, title: "第三課", words: ["媽", "音", "樂", "會", "始", "來", "重", "短", "陣", "過", "後", "吃", "菜", "就", "桌", "真"] },
      { id: 4, title: "第四課", words: ["鞋", "回", "家", "把", "脫", "爸", "靠", "見", "像", "船", "港", "口", "享", "受", "溫", "暖"] },
      { id: 5, title: "第五課", words: ["種", "問", "怎", "做", "它", "才", "需", "於", "澆", "陽", "光", "放", "院", "公", "話", "伴"] },
      { id: 6, title: "第六課", words: ["奶", "跟", "班", "床", "弟", "她", "酒", "拿", "卡", "片", "給", "寫", "喜", "歡", "您", "都"] },
      { id: 7, title: "第七課", words: ["作", "夢", "躺", "自", "己", "變", "成", "棉", "糖", "黑", "鵝", "得", "更", "漂", "亮"] },
      { id: 8, title: "第八課", words: ["妹", "雨", "雙", "穿", "滴", "遊", "戲", "顆", "珍", "珠", "落", "面", "魚", "缸", "金", "游"] },
      { id: 9, title: "第九課", words: ["彩", "虹", "太", "國", "掃", "除", "洗", "淨", "馬", "低", "刷", "樹", "葉", "很", "認", "送"] },
      { id: 10, title: "第十課", words: ["地", "化", "趣", "線", "風", "箏", "升", "神", "奇", "跑", "跳", "笑", "每", "件", "事", "情"] },
      { id: 11, title: "第十一課", words: ["生", "日", "今", "記", "時", "知", "道", "嗎", "學", "收", "張", "祝", "福", "第", "次", "謝"] },
      { id: 12, title: "第十二課", words: ["想", "燈", "前", "點", "半", "清", "楚", "停", "休", "息", "兒", "吧", "幫", "加", "油", "慢"] }
    ];

    // --- 2. 系統狀態變數 ---
    let currentLessonIndex = 0;
    let currentWord = "";
    let completedWords = new Set(); 
    let writer = null; 

    // --- 3. 首頁初始化 ---
    const grid = document.getElementById('lessonGrid');
    lessonsData.forEach((lesson, index) => {
      const btn = document.createElement('button');
      btn.className = `lesson-btn color-${(index % 6) + 1}`;
      btn.innerText = lesson.title;
      
      btn.onclick = () => {
        if (lesson.words.length === 0) {
          alert("這一課的生字還沒建立喔！");
          return;
        }
        startLesson(index);
      };
      grid.appendChild(btn);
    });

    // --- 4. 切換到學習頁 ---
    function startLesson(index) {
      currentLessonIndex = index;
      const lesson = lessonsData[index];
      
      // 初始化狀態
      completedWords.clear();
      document.getElementById('nextLessonBtn').style.display = 'none';
      document.getElementById('lessonTitle').innerText = lesson.title;
      
      // 隱藏首頁，顯示學習頁
      document.getElementById('homePage').style.display = 'none';
      document.getElementById('learningPage').style.display = 'block';

      // 建立頂部生字按鈕
      const wordListBar = document.getElementById('wordListBar');
      wordListBar.innerHTML = ''; 
      
      lesson.words.forEach(word => {
        const tab = document.createElement('div');
        tab.className = 'word-tab';
        tab.id = `tab-${word}`;
        tab.innerText = word;
        tab.onclick = () => loadCharacter(word);
        wordListBar.appendChild(tab);
      });

      // 自動載入第一個字
      loadCharacter(lesson.words[0]);
    }

    // --- 5. 載入單一生字與畫布邏輯 ---
    function loadCharacter(word) {
      currentWord = word;

      // 更新頂部按鈕的視覺狀態
      document.querySelectorAll('.word-tab').forEach(tab => tab.classList.remove('active'));
      document.getElementById(`tab-${word}`).classList.add('active');

      // 清空舊畫布
      document.getElementById('character-canvas').innerHTML = '';

      // 建立 Hanzi Writer
      writer = HanziWriter.create('character-canvas', word, {
        width: 300,
        height: 300,
        padding: 15,
        showCharacter: false, 
        showOutline: true,    
        outlineColor: '#DDDDDD',
        strokeColor: '#333333', 
        showHintAfterMisses: 2, 
        highlightOnComplete: true
      });

      // 啟動測驗模式
      startQuiz();
    }

    // --- 6. 測驗與過關判定 ---
    function startQuiz() {
      writer.quiz({
        onComplete: function(summaryData) {
          // 在 UI 上標記為完成 (加上綠色勾勾)
          const tab = document.getElementById(`tab-${currentWord}`);
          tab.classList.add('completed');
          completedWords.add(currentWord);

          // 檢查是否整課都寫完了
          const lesson = lessonsData[currentLessonIndex];
          if (completedWords.size === lesson.words.length) {
            document.getElementById('nextLessonBtn').style.display = 'block';
            setTimeout(() => alert("太棒了！這一課的生字都寫完了！🎉"), 500);
          }
        }
      });
    }

    // --- 7. 輔助功能按鈕 ---
    function restartQuiz() {
      writer.quiz(); 
    }

    function goHome() {
      document.getElementById('learningPage').style.display = 'none';
      document.getElementById('homePage').style.display = 'block';
    }

    function goToNextLesson() {
      const nextIndex = currentLessonIndex + 1;
      if (nextIndex < lessonsData.length && lessonsData[nextIndex].words.length > 0) {
        startLesson(nextIndex);
      } else {
        alert("恭喜你！全部課程都結束了！");
        goHome();
      }
    }
  </script>
</body>
</html>
